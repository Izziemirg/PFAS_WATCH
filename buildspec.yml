version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - cd $CODEBUILD_SRC_DIR/frontend
      - npm install
  build:
    commands:
      - echo "Building React app..."
      - cd $CODEBUILD_SRC_DIR/frontend
      - npm run build
artifacts:
  base-directory: frontend/dist
  files:
    - '**/*'
